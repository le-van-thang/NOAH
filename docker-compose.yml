version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: noahretail-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: webstore
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: noahretail-postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: noahretail-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order_api:
    build: ./backend/order_api
    container_name: noahretail-order_api
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: ./backend/middleware_worker
    container_name: noahretail-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started

  inventory_sync:
    build: ./backend/inventory_sync
    container_name: noahretail-inventory_sync
    depends_on:
      mysql:
        condition: service_healthy

  dashboard:
    container_name: noahretail-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_started
